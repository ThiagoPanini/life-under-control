name: pr-checks

# Portão 2 — gate real antes do merge na main.
# Dispara no push das branches de trabalho (incluindo worktree/** geradas
# pelo agente). open-pr abre PR para a main quando todos os checks ficam
# verdes; o merge é autônomo no verde (ADR-0007).
#
# O job web pula em verde enquanto apps/web ainda não existe (pré-protótipo).

on:
  push:
    branches:
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
      - "refactor/**"
      - "test/**"
      - "worktree/**"

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web
    runs-on: ubuntu-latest
    # Postgres real para o teste de Seam 2 (adapter Drizzle). Os demais passos
    # ignoram o serviço; só o passo de teste recebe DATABASE_URL.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: luc
          POSTGRES_PASSWORD: luc
          POSTGRES_DB: luc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U luc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - id: appcheck
        run: |
          if [ -f apps/web/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/web ainda nao existe — gate web pulado."
          fi
      - uses: pnpm/action-setup@v6
        if: steps.appcheck.outputs.exists == 'true'
      - uses: actions/setup-node@v6
        if: steps.appcheck.outputs.exists == 'true'
        with:
          node-version-file: .node-version
          cache: pnpm
      - if: steps.appcheck.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile
      - name: lint (biome)
        if: steps.appcheck.outputs.exists == 'true'
        run: node_modules/.bin/biome check apps/web
      - name: typecheck (tsc)
        if: steps.appcheck.outputs.exists == 'true'
        run: pnpm --filter @luc/web typecheck
      - name: test (vitest)
        if: steps.appcheck.outputs.exists == 'true'
        env:
          DATABASE_URL: postgres://luc:luc@localhost:5432/luc
        run: pnpm --filter @luc/web test

  api:
    name: api
    runs-on: ubuntu-latest
    # Postgres real para o Seam-2 das fatias F2 (repos + fidelidade do MetaData
    # + boot do Alembic). Os demais passos ignoram o serviço; só o passo de
    # teste recebe DATABASE_URL.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: luc
          POSTGRES_PASSWORD: luc
          POSTGRES_DB: luc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U luc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - id: appcheck
        run: |
          if [ -f apps/api/pyproject.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::apps/api ainda nao existe — gate api pulado."
          fi
      # MinIO real pro R2AttachmentStore (#194) — mesma imagem do
      # docker-compose local (minio/minio). O schema `services:` do GitHub
      # Actions não passa `command:` pro container, e essa imagem exige
      # `server /data` como args pra subir o servidor; roda via `docker run`
      # manual em vez de `services:`.
      - name: start minio
        if: steps.appcheck.outputs.exists == 'true'
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=lucminio \
            -e MINIO_ROOT_PASSWORD=lucminio123 \
            minio/minio server /data
          until curl -sf http://localhost:9000/minio/health/live; do
            echo "aguardando o MinIO..."; sleep 1
          done
      - uses: astral-sh/setup-uv@v6
        if: steps.appcheck.outputs.exists == 'true'
        with:
          enable-cache: true
      - if: steps.appcheck.outputs.exists == 'true'
        working-directory: apps/api
        run: uv sync --frozen
      - name: format (ruff)
        if: steps.appcheck.outputs.exists == 'true'
        working-directory: apps/api
        run: uv run --frozen ruff format --check .
      - name: lint (ruff)
        if: steps.appcheck.outputs.exists == 'true'
        working-directory: apps/api
        run: uv run --frozen ruff check .
      - name: types (pyright)
        if: steps.appcheck.outputs.exists == 'true'
        working-directory: apps/api
        run: uv run --frozen pyright
      - name: imports (import-linter)
        if: steps.appcheck.outputs.exists == 'true'
        working-directory: apps/api
        run: uv run --frozen lint-imports
      - name: test (pytest)
        if: steps.appcheck.outputs.exists == 'true'
        working-directory: apps/api
        env:
          DATABASE_URL: postgres://luc:luc@localhost:5432/luc
          R2_ENDPOINT: http://localhost:9000
          R2_ACCESS_KEY_ID: lucminio
          R2_SECRET_ACCESS_KEY: lucminio123
          R2_BUCKET: luc-attachments-test
        run: uv run --frozen pytest

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # O wrapper gitleaks/gitleaks-action@v2 passou a exigir licença paga desde que
      # o repo virou de organização ("[panlabs-tech] is an organization. License key
      # is required."), reprovando todo PR. O binário do gitleaks é MIT e gratuito —
      # rodamos a CLI direto. Ganho colateral: a Action varre só os commits do push,
      # a CLI varre o histórico inteiro (medido: 214 commits, sem achado).
      # Versão e checksum pinados: é o job de segurança, não baixa binário no escuro.
      - name: gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL -o "/tmp/${tarball}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          echo "${GITLEAKS_SHA256}  /tmp/${tarball}" | sha256sum --check --strict
          tar -xzf "/tmp/${tarball}" -C /tmp gitleaks
          /tmp/gitleaks version

          # Guarda anti-verde-vazio: fora de um repo git o gitleaks loga ERR,
          # varre 0 commits e ainda assim sai 0. Gate que pode passar em silêncio
          # não é gate — então a ausência de varredura falha o build.
          git rev-parse --is-inside-work-tree >/dev/null

          # Status capturado explicitamente: com `| tee` o código de saída do
          # gitleaks se perde e um vazamento encontrado sairia verde (medido).
          status=0
          /tmp/gitleaks git . --redact --no-banner --no-color >/tmp/gitleaks.log 2>&1 || status=$?
          cat /tmp/gitleaks.log

          if grep -qE '(^|[^0-9])0 commits scanned' /tmp/gitleaks.log; then
            echo "::error::gitleaks nao varreu commit algum — varredura vazia nao conta como verde."
            exit 1
          fi
          exit "$status"

  open-pr:
    name: open-pr
    needs: [web, api, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Abrir PR para a main se ainda nao existir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$(gh pr list --head "$BRANCH" --base main --state open --json number --jq 'length')" -ne 0 ]; then
            echo "::notice::Ja existe PR aberto de $BRANCH para a main."
            exit 0
          fi

          git fetch --quiet origin main
          if [ "$(git rev-list --count FETCH_HEAD..HEAD)" -eq 0 ]; then
            echo "::notice::$BRANCH nao tem commits novos sobre a main."
            exit 0
          fi

          title="$(git log "FETCH_HEAD..HEAD" --pretty=%s | head -n1 || true)"
          [ -z "$title" ] && title="$(git log -1 --pretty=%s)"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$title" \
            --body "PR aberto automaticamente apos checks verdes (pr-checks). Merge autonomo no verde (ADR-0007)."

          echo "::notice::PR aberto: $BRANCH -> main"
